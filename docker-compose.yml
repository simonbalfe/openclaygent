services:
  api:
    image: ghcr.io/simonbalfe/openclaygent:latest
    pull_policy: always
    entrypoint: ["bun", "run", "src/api.ts"]
    container_name: openclaygent-api
    env_file: .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - PATCHRIGHT_URL=http://patchright:9223
      - PORT=8080
    ports:
      - "8080:8080"
    depends_on:
      searxng:
        condition: service_healthy
      patchright:
        condition: service_started
    restart: unless-stopped

  claygent:
    image: ghcr.io/simonbalfe/openclaygent:latest
    pull_policy: always
    profiles: ["cli"]
    env_file: .env
    environment:
      - SEARXNG_URL=http://searxng:8080
      - PATCHRIGHT_URL=http://patchright:9223
    depends_on:
      searxng:
        condition: service_healthy
      patchright:
        condition: service_started

  patchright:
    image: ghcr.io/simonbalfe/openclaygent-patchright:latest
    pull_policy: always
    container_name: openclaygent-patchright
    ports:
      - "9223:9223"
    environment:
      - EVOMI_USERNAME=${EVOMI_USERNAME:-}
      - EVOMI_PASSWORD=${EVOMI_PASSWORD:-}
      - EVOMI_GATEWAY=${EVOMI_GATEWAY:-}
      - CAPSOLVER_API_KEY=${CAPSOLVER_API_KEY:-}
      - TWOCAPTCHA_API_KEY=${TWOCAPTCHA_API_KEY:-}
    # Headed Chrome needs user namespaces for its sandbox — Docker's default seccomp blocks them.
    security_opt:
      - seccomp:unconfined
    init: true
    restart: unless-stopped

  searxng:
    image: ghcr.io/simonbalfe/openclaygent-searxng:latest
    pull_policy: always
    container_name: openclaygent-searxng
    ports:
      - "8888:8080"
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:-openclaygent-local-dev}
      - EVOMI_USERNAME=${EVOMI_USERNAME:-}
      - EVOMI_PASSWORD=${EVOMI_PASSWORD:-}
      - EVOMI_GATEWAY=${EVOMI_GATEWAY:-}
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped
